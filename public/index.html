<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>金靴杯后台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">Golden Boot Cup Admin</div>
          <h1>金靴杯数据后台</h1>
          <p>管理赛程、赛果、用户观赛判断、积分和真实排行榜。</p>
        </div>
        <div class="top-actions">
          <button id="syncGoldenBtn">同步赛程</button>
          <button id="refreshBtn" class="secondary">刷新数据</button>
        </div>
      </header>

      <section id="syncMessage" class="sync-message"></section>

      <section class="grid stats">
        <article>
          <span>比赛总数</span>
          <strong id="matchCount">0</strong>
        </article>
        <article>
          <span>进行中</span>
          <strong id="liveCount">0</strong>
        </article>
        <article>
          <span>已完场</span>
          <strong id="doneCount">0</strong>
        </article>
        <article>
          <span>排行榜人数</span>
          <strong id="rankCount">0</strong>
        </article>
      </section>

      <section class="panel priority-panel">
        <div class="panel-head">
          <div>
            <h2>预测排行榜</h2>
            <p>真实用户榜单：赛果积分 + 有效邀请积分。用户提交观赛判断并产生积分后会自动上榜。</p>
          </div>
          <button id="refreshRankBtn" class="secondary small-btn">刷新榜单</button>
        </div>
        <div id="leaderboard" class="rank-list featured-rank-list"></div>
      </section>

      <section class="two-col top-section">
        <article class="panel">
          <div class="panel-head">
            <div>
              <h2>测试提交观赛判断</h2>
              <p>用于后台验证积分、赛果更新和排行榜结果。</p>
            </div>
          </div>
          <form id="predictionForm" class="form">
            <label>
              比赛
              <select id="matchSelect"></select>
            </label>
            <label>
              用户昵称
              <input id="nicknameInput" value="我的预测" />
            </label>
            <label>
              胜平负
              <select id="resultSelect">
                <option value="home">主胜</option>
                <option value="draw">平局</option>
                <option value="away">客胜</option>
              </select>
            </label>
            <label>
              比分参考
              <input id="scoreInput" value="2-1" />
            </label>
            <button type="submit">提交观赛判断</button>
          </form>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <h2>我的测试记录</h2>
              <p>展示当前测试用户的提交记录、命中情况和得分。</p>
            </div>
          </div>
          <div id="predictions" class="prediction-list"></div>
        </article>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>比赛管理</h2>
            <p>修改状态和比分后，小程序接口会返回最新数据；点击“同步赛程”会从金靴杯官网刷新。</p>
          </div>
        </div>
        <div id="matches" class="match-list"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
